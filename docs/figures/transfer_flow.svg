<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520" font-family="Arial, sans-serif">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #1a1a1a; }
    .subtitle { font-size: 11px; fill: #555; }
    .label { font-size: 11px; fill: #1a1a1a; }
    .label-small { font-size: 10px; fill: #555; }
    .axis { stroke: #888; stroke-width: 1; }
    .grid { stroke: #ddd; stroke-width: 0.5; stroke-dasharray: 3,3; }
    .bar-good { fill: #2e8b57; }
    .bar-warn { fill: #d97706; }
    .bar-info { fill: #2563eb; }
    .bar-neutral { fill: #6b7280; }
    .threshold { stroke: #dc2626; stroke-width: 1.5; stroke-dasharray: 6,3; }
    .threshold-label { font-size: 10px; fill: #dc2626; font-weight: bold; }
    .box { fill: #f8f9fb; stroke: #1f3a5f; stroke-width: 1.5; rx: 6; ry: 6; }
    .box-text { font-size: 11px; fill: #1a1a1a; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
    .arrow-text { font-size: 9px; fill: #444; }
    .role { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 4; ry: 4; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="460" y="32" text-anchor="middle" class="title">Fluxo de execucao da transferencia (entrega contra pagamento)</text>
  <text x="460" y="52" text-anchor="middle" class="subtitle">Amarelo: fora da cadeia (cliente / regulador)   |   Azul: na cadeia (Hyperledger Besu, QBFT)</text>
  <rect x="160" y="72" width="600" height="92" rx="8" ry="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="180" y="94" font-size="12" font-weight="bold" fill="#1a1a1a">Momento 0 - Cliente (fora da cadeia)</text><text x="180" y="116" font-size="11" fill="#333">Calcula os compromissos Poseidon do saldo</text><text x="180" y="135" font-size="11" fill="#333">Gera a prova Groth16 (valida a operacao sem revelar valores)</text><text x="180" y="154" font-size="11" fill="#333">Cifra os dados de auditoria com ECIES para o regulador</text>
  <line x1="460" y1="164" x2="460" y2="184" class="arrow"/>
  <rect x="160" y="184" width="600" height="50" rx="8" ry="8" fill="#eef4fb" stroke="#1f3a5f" stroke-width="1.5"/><text x="180" y="206" font-size="12" font-weight="bold" fill="#1a1a1a">Momento 1 - Registro inicial: mint (PrivateToken)</text><text x="180" y="228" font-size="11" fill="#333">Grava os compromissos iniciais na cadeia (apenas hashes)</text>
  <line x1="460" y1="234" x2="460" y2="254" class="arrow"/>
  <rect x="160" y="254" width="600" height="150" rx="8" ry="8" fill="#eef4fb" stroke="#1f3a5f" stroke-width="1.5"/><text x="180" y="276" font-size="12" font-weight="bold" fill="#1a1a1a">Momento 2 - executeDvP: transacao atomica (DvPSettlement)</text><text x="180" y="298" font-size="11" fill="#333">1. Verifier valida a prova on-chain (precompileds BN128)</text><text x="180" y="317" font-size="11" fill="#333">2. Confere se os compromissos atuais batem com a prova</text><text x="180" y="336" font-size="11" fill="#333">3. Atualiza os compromissos: a transferencia se efetiva</text><text x="180" y="355" font-size="11" fill="#333">4. RegulatorViewer armazena o blob cifrado (ECIES)</text><text x="180" y="374" font-size="11" fill="#333">5. Emite eventos, sem expor valores</text>
  <line x1="460" y1="404" x2="460" y2="424" class="arrow"/>
  <rect x="160" y="424" width="600" height="72" rx="8" ry="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="180" y="446" font-size="12" font-weight="bold" fill="#1a1a1a">Momento 3 - Auditoria: regulador (fora da cadeia)</text><text x="180" y="468" font-size="11" fill="#333">accessEncryptedTx emite o evento RegulatorAccessed (trilha)</text><text x="180" y="487" font-size="11" fill="#333">Decifra o blob com a chave privada e obtem os valores reais</text>
</svg>