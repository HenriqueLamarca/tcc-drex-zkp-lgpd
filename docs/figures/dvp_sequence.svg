<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="Arial, sans-serif">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #1a1a1a; }
    .subtitle { font-size: 11px; fill: #555; }
    .label { font-size: 11px; fill: #1a1a1a; }
    .label-small { font-size: 10px; fill: #555; }
    .axis { stroke: #888; stroke-width: 1; }
    .grid { stroke: #ddd; stroke-width: 0.5; stroke-dasharray: 3,3; }
    .bar-good { fill: #2e8b57; }
    .bar-warn { fill: #d97706; }
    .bar-info { fill: #2563eb; }
    .bar-neutral { fill: #6b7280; }
    .threshold { stroke: #dc2626; stroke-width: 1.5; stroke-dasharray: 6,3; }
    .threshold-label { font-size: 10px; fill: #dc2626; font-weight: bold; }
    .box { fill: #f8f9fb; stroke: #1f3a5f; stroke-width: 1.5; rx: 6; ry: 6; }
    .box-text { font-size: 11px; fill: #1a1a1a; text-anchor: middle; }
    .arrow { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
    .arrow-text { font-size: 9px; fill: #444; }
    .role { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 4; ry: 4; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="500" y="30" text-anchor="middle" class="title">Sequencia da transacao DvP ponta-a-ponta</text>
  <text x="500" y="48" text-anchor="middle" class="subtitle">Off-chain (1-4) | On-chain atomico (5-14) | Auditoria assincrona (15-16)</text>
  
  <rect x="30" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="80" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Alice (Cliente)</text>
  <line x1="80" y1="100" x2="80" y2="670" class="grid"/>
    
  <rect x="170" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="220" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ZoKrates</text>
  <line x1="220" y1="100" x2="220" y2="670" class="grid"/>
    
  <rect x="310" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="360" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">DvPSettlement</text>
  <line x1="360" y1="100" x2="360" y2="670" class="grid"/>
    
  <rect x="450" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="500" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Verifier</text>
  <line x1="500" y1="100" x2="500" y2="670" class="grid"/>
    
  <rect x="590" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="640" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PrivateToken</text>
  <line x1="640" y1="100" x2="640" y2="670" class="grid"/>
    
  <rect x="730" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="780" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">RegulatorViewer</text>
  <line x1="780" y1="100" x2="780" y2="670" class="grid"/>
    
  <rect x="870" y="70" width="100" height="30" fill="#1f3a5f" rx="4"/>
  <text x="920" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Regulador</text>
  <line x1="920" y1="100" x2="920" y2="670" class="grid"/>
    
  <line x1="20" y1="245" x2="980" y2="245" stroke="#aaa" stroke-width="0.5" stroke-dasharray="6,3"/>
  <text x="40" y="260" class="label-small" font-style="italic">--- on-chain (atomico) ---</text>
  <line x1="20" y1="580" x2="980" y2="580" stroke="#aaa" stroke-width="0.5" stroke-dasharray="6,3"/>
  <text x="40" y="595" class="label-small" font-style="italic">--- auditoria assincrona ---</text>
  
  <line x1="80" y1="130" x2="220" y2="130" class="arrow" />
  <text x="150" y="125" text-anchor="middle" class="arrow-text">1. compute-witness</text>
    
  <line x1="220" y1="160" x2="80" y2="160" class="arrow" stroke-dasharray="5,3"/>
  <text x="150" y="155" text-anchor="middle" class="arrow-text">2. witness</text>
    
  <line x1="80" y1="190" x2="220" y2="190" class="arrow" />
  <text x="150" y="185" text-anchor="middle" class="arrow-text">3. generate-proof</text>
    
  <line x1="220" y1="220" x2="80" y2="220" class="arrow" stroke-dasharray="5,3"/>
  <text x="150" y="215" text-anchor="middle" class="arrow-text">4. proof.json (256B)</text>
    
  <line x1="80" y1="270" x2="360" y2="270" class="arrow" />
  <text x="220" y="265" text-anchor="middle" class="arrow-text">5. executeDvP(proof, inputs, ciphertext)</text>
    
  <line x1="360" y1="305" x2="640" y2="305" class="arrow" />
  <text x="500" y="300" text-anchor="middle" class="arrow-text">6. read commitments[A,B]</text>
    
  <line x1="640" y1="335" x2="360" y2="335" class="arrow" stroke-dasharray="5,3"/>
  <text x="500" y="330" text-anchor="middle" class="arrow-text">7. current hashes</text>
    
  <line x1="360" y1="365" x2="500" y2="365" class="arrow" />
  <text x="430" y="360" text-anchor="middle" class="arrow-text">8. verifyTx(proof, inputs)</text>
    
  <line x1="500" y1="395" x2="360" y2="395" class="arrow" stroke-dasharray="5,3"/>
  <text x="430" y="390" text-anchor="middle" class="arrow-text">9. true (BN128 pairing OK)</text>
    
  <line x1="360" y1="425" x2="640" y2="425" class="arrow" />
  <text x="500" y="420" text-anchor="middle" class="arrow-text">10. setCommitment(A, new)</text>
    
  <line x1="360" y1="455" x2="640" y2="455" class="arrow" />
  <text x="500" y="450" text-anchor="middle" class="arrow-text">11. setCommitment(B, new)</text>
    
  <line x1="360" y1="485" x2="780" y2="485" class="arrow" />
  <text x="570" y="480" text-anchor="middle" class="arrow-text">12. recordTx(A, B, ciphertext)</text>
    
  <line x1="780" y1="515" x2="360" y2="515" class="arrow" stroke-dasharray="5,3"/>
  <text x="570" y="510" text-anchor="middle" class="arrow-text">13. txId</text>
    
  <line x1="360" y1="545" x2="80" y2="545" class="arrow" stroke-dasharray="5,3"/>
  <text x="220" y="540" text-anchor="middle" class="arrow-text">14. tx confirmada (DvPSettled)</text>
    
  <line x1="920" y1="605" x2="780" y2="605" class="arrow" />
  <text x="850" y="600" text-anchor="middle" class="arrow-text">15. getEncryptedTx(txId)</text>
    
  <line x1="780" y1="635" x2="920" y2="635" class="arrow" stroke-dasharray="5,3"/>
  <text x="850" y="630" text-anchor="middle" class="arrow-text">16. EncryptedRecord</text>
    
</svg>