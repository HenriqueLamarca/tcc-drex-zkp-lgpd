name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "docs/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint Solidity
        run: npm run lint:sol

      - name: Lint TypeScript
        run: npm run lint:ts

      - name: Typecheck
        run: npm run typecheck

      - name: Compilar contratos
        run: npm run compile

      - name: Executar testes (Hardhat Network)
        run: npm test

      - name: Cobertura de testes
        run: npm run coverage

      - name: Verificar cobertura mínima (80%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total']['lines']['pct'])")
          echo "Cobertura de linhas: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}')
          if cov < 80:
              raise SystemExit(f'Cobertura {cov}% abaixo do mínimo de 80%')
          print(f'OK: cobertura {cov}% >= 80%')
          "

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
